<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic2Tic</title>

<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#4f46e5;
  --border:#e5e7eb;
  --glass:rgba(255,255,255,.7);
  --success:#10b981;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --card:#020617;
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#818cf8;
  --border:#1e293b;
  --glass:rgba(2,6,23,.7);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: 'Inter', -apple-system, sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .3s ease;
}

/* ===== INSTALL PROMPT ===== */
.install-prompt{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1rem 1.2rem;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  z-index:1000;
  display:none;
  align-items:center;
  gap:1rem;
  backdrop-filter:blur(14px);
  animation:slideUp .3s ease;
}

@keyframes slideUp{
  from{transform:translate(-50%,20px);opacity:0}
  to{transform:translate(-50%,0);opacity:1}
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem 1.5rem;
  border-bottom:1px solid var(--border);
}

.brand{
  display:flex;
  align-items:center;
  gap:.6rem;
  font-family:'Playfair Display', serif;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:.5px;
}

.brand i{
  color:var(--accent);
}

.header-controls{
  display:flex;
  gap:.5rem;
  align-items:center;
}

.install-btn, .theme-btn{
  background:var(--card);
  border:1px solid var(--border);
  width:42px;height:42px;
  border-radius:50%;
  display:grid;place-items:center;
  cursor:pointer;
  color:var(--text);
  transition:transform .2s ease;
}

.install-btn:hover, .theme-btn:hover{
  transform:scale(1.08);
}

/* ===== MAIN ===== */
main{
  max-width:800px;
  margin:0 auto;
  padding:2rem 1.5rem 4rem;
}

/* ===== QUOTE ===== */
.quote-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.8rem;
  margin-bottom:2.5rem;
  position:relative;
  overflow:hidden;
}

.quote-card::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:4px;
  height:100%;
  background:var(--accent);
}

.quote-content{
  font-size:1.15rem;
  font-weight:500;
  line-height:1.5;
  margin-bottom:1rem;
}

.quote-author{
  color:var(--muted);
  font-size:.9rem;
  text-align:right;
}

.refresh-quote{
  position:absolute;
  top:1rem;
  right:1rem;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  padding:.5rem;
}

/* ===== COUNTDOWN ===== */
.countdown-container{
  background:linear-gradient(180deg,var(--glass),transparent);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:3rem 2rem;
  margin-bottom:2.5rem;
  position:relative;
  overflow:hidden;
}

.countdown-container::after{
  content:'';
  position:absolute;
  top:0;right:0;
  width:120px;height:120px;
  background:linear-gradient(45deg,var(--accent),transparent 70%);
  opacity:.1;
  border-radius:0 0 0 100%;
}

.timer{
  font-family:'JetBrains Mono', monospace;
  font-size:4.5rem;
  font-weight:800;
  color:var(--accent);
  letter-spacing:2px;
  text-shadow:0 4px 20px rgba(79,70,229,.2);
  margin:.5rem 0;
  position:relative;
}

.timer::after{
  content:'';
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  width:100px;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.5;
}

.labels{
  display:flex;
  justify-content:center;
  gap:3rem;
  margin-top:1rem;
  font-size:.85rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}

/* ===== SETTINGS ===== */
.settings-toggle{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.5rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:999px;
  padding:.6rem 1.2rem;
  margin:0 auto 2rem;
  cursor:pointer;
  width:fit-content;
  transition:all .3s ease;
}

.settings-toggle:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.settings-panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:2rem;
  margin-bottom:2rem;
  display:none;
}

.settings-panel.active{
  display:block;
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

.setting-group{
  margin-bottom:1.5rem;
}

.setting-group label{
  display:block;
  margin-bottom:.5rem;
  font-weight:600;
  color:var(--text);
}

.setting-group select,
.setting-group input{
  width:100%;
  padding:.8rem 1rem;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:inherit;
}

.checkbox{
  display:flex;
  align-items:center;
  gap:.5rem;
  margin-top:.5rem;
}

/* ===== INFO CARDS ===== */
.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:1rem;
  margin-top:2rem;
}

.info-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.2rem;
}

.info-card span{
  font-size:.75rem;
  text-transform:uppercase;
  color:var(--muted);
  letter-spacing:.5px;
}

.info-card p{
  font-weight:600;
  margin-top:.3rem;
  font-size:1rem;
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  gap:1rem;
  justify-content:center;
  margin-top:3rem;
  flex-wrap:wrap;
}

.ctrl-btn{
  padding:.8rem 1.6rem;
  border-radius:999px;
  border:none;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:.5rem;
  transition:all .3s ease;
}

.ctrl-btn.primary{
  background:var(--accent);
  color:white;
}

.ctrl-btn.primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(79,70,229,.3);
}

.ctrl-btn.secondary{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--card);
  border:1px solid var(--border);
  padding:.8rem 1.4rem;
  border-radius:999px;
  box-shadow:0 15px 30px rgba(0,0,0,.15);
  animation:fade .3s ease;
  z-index:1001;
  display:flex;
  align-items:center;
  gap:.8rem;
  backdrop-filter:blur(14px);
}

.toast.success{
  border-left:4px solid var(--success);
}

@keyframes fade{
  from{opacity:0;transform:translate(-50%,10px)}
  to{opacity:1;transform:translate(-50%,0)}
}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .timer{font-size:3.2rem}
  .info-grid{grid-template-columns:1fr}
  .controls{flex-direction:column;align-items:center}
  .ctrl-btn{width:100%;justify-content:center}
}

@media(max-width:380px){
  .timer{font-size:2.5rem}
  .quote-content{font-size:1rem}
}
</style>
</head>

<body>

<div class="install-prompt" id="installPrompt">
  <i class="fas fa-download" style="color:var(--accent)"></i>
  <div>
    <div style="font-weight:600">Install Tic2Tic</div>
    <div style="font-size:.85rem;color:var(--muted)">Add to home screen for full experience</div>
  </div>
  <button id="installBtn" style="margin-left:auto">Install</button>
</div>

<header>
  <div class="brand">
    <i class="fa-solid fa-hourglass-half"></i>
    <span>Tic2Tic</span>
  </div>
  <div class="header-controls">
    <button class="install-btn" id="installBtnHeader" title="Install">
      <i class="fas fa-download"></i>
    </button>
    <button class="theme-btn" id="themeToggle">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>
</header>

<main>
  <!-- Quote of the Week -->
  <div class="quote-card">
    <button class="refresh-quote" id="refreshQuote" title="New quote">
      <i class="fas fa-redo"></i>
    </button>
    <div class="quote-content" id="quoteText">Your weekly inspiration appears here</div>
    <div class="quote-author" id="quoteAuthor">— Tic2Tic</div>
  </div>

  <!-- Countdown -->
  <div class="countdown-container">
    <div class="timer" id="display">00000:00.000</div>
    <div class="labels">
      <span>Minutes</span>
      <span>Seconds</span>
      <span>Milliseconds</span>
    </div>
  </div>

  <!-- Settings Toggle -->
  <div class="settings-toggle" id="settingsToggle">
    <i class="fas fa-sliders-h"></i>
    <span>Settings</span>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="setting-group">
      <label>Target Day & Time</label>
      <select id="targetDay">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
    </div>
    
    <div class="setting-group">
      <label>Target Time</label>
      <input type="time" id="targetTime" value="00:00">
    </div>

    <div class="setting-group">
      <label>Timezone</label>
      <select id="timezone">
        <option value="Africa/Lagos" selected>Lagos (WAT)</option>
        <option value="Europe/London">London (GMT)</option>
        <option value="America/New_York">New York (EST)</option>
        <option value="Asia/Tokyo">Tokyo (JST)</option>
        <option value="Australia/Sydney">Sydney (AEST)</option>
      </select>
    </div>

    <div class="setting-group">
      <div class="checkbox">
        <input type="checkbox" id="soundToggle" checked>
        <label for="soundToggle">Hourly sound alerts</label>
      </div>
      <div class="checkbox">
        <input type="checkbox" id="notificationsToggle">
        <label for="notificationsToggle">Enable notifications</label>
      </div>
    </div>
  </div>

  <!-- Info Cards -->
  <div class="info-grid">
    <div class="info-card">
      <span>Period Start</span>
      <p id="periodStart">—</p>
    </div>
    <div class="info-card">
      <span>Period End</span>
      <p id="periodEnd">—</p>
    </div>
    <div class="info-card">
      <span>Current Time</span>
      <p id="nowTime">—</p>
    </div>
    <div class="info-card">
      <span>Timezone</span>
      <p id="timezoneDisplay">Lagos (WAT)</p>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn primary" id="shareBtn">
      <i class="fas fa-share-alt"></i>
      Share
    </button>
    <button class="ctrl-btn secondary" id="soundTestBtn">
      <i class="fas fa-volume-up"></i>
      Test Sound
    </button>
    <button class="ctrl-btn secondary" id="resetBtn">
      <i class="fas fa-redo"></i>
      Reset Countdown
    </button>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
